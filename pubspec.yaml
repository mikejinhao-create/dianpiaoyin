name: dianpiaoyin
description: 电票印 - 电子发票管理打印App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9

  # Supabase (数据库+Auth+Storage)
  supabase_flutter: ^2.3.2

  # 网络请求
  dio: ^5.4.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF预览
  pdfx: ^2.6.0

  # 打印
  printing: ^5.12.0

  # 图片选择
  image_picker: ^1.0.7

  # 扫码
  mobile_scanner: ^4.0.1

  # 路由
  go_router: ^13.1.0

  # UI组件
  cupertino_icons: ^1.0.6

  # 工具
  intl: ^0.19.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
